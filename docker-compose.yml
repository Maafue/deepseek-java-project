version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: task_postgres
    environment:
      POSTGRES_DB: task_db
      POSTGRES_USER: self_fu
      POSTGRES_PASSWORD: self_fu
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U self_fu -d task_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: task_app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/task_db
      DB_USER: self_fu
      DB_PASSWORD: self_fu
    ports:
      - "8080:8080"

volumes:
  postgres_data: