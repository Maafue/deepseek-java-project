spring.application.name=deepseek-task-service
#Datasource
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/task_db}
spring.datasource.username=${DB_USER:self_fu}
spring.datasource.password=${DB_PASSWORD:self_fu}

#Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true