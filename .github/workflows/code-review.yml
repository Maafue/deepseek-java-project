name: DeepSeek Code Review

permissions:
  contents: read
  pull-requests: write

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR diff
        id: diff
        run: |
          curl -L \
            -H "Accept: application/vnd.github.v3.diff" \
            -H "Authorization: Bearer ${{ github.token }}" \
            "${{ github.event.pull_request.diff_url }}" > pr.diff
          echo "diff_length=$(wc -c < pr.diff)" >> $GITHUB_OUTPUT

      - name: Call DeepSeek API
        if: steps.diff.outputs.diff_length < 50000
        env:
          DEEPSEEK_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          DIFF_CONTENT=$(cat pr.diff | jq -Rsa .)
          
          curl -X POST https://api.deepseek.com/v1/chat/completions \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $DEEPSEEK_KEY" \
            -d '{
              "model": "deepseek-chat",
              "messages": [
                {
                  "role": "system",
                  "content": "Ты — тимлид Java-проекта. Делай краткое, но полезное код-ревью. Указывай конкретные строки, имена файлов и что исправить."
                },
                {
                  "role": "user",
                  "content": "Отревьювь этот pull request. Название: '"$PR_TITLE"'. Описание: '"$PR_BODY"'. Дифф:\n'"$DIFF_CONTENT"
                }
              ]
            }' > response.json
          
          COMMENT=$(jq -r '.choices[0].message.content' response.json)
          
          curl -X POST \
            -H "Authorization: Bearer ${{ github.token }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments \
            -d "{\"body\": \"## 🤖 DeepSeek Code Review\n\n$COMMENT\"}"