- name: Prepare review prompt
  id: prep
  run: |
    # Ограничиваем размер diff (первые 5000 строк)
    DIFF=$(head -5000 pr.diff | jq -Rs .)
    echo "prompt=${DIFF}" >> $GITHUB_OUTPUT

- name: Call DeepSeek API
  env:
    DEEPSEEK_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
  run: |
    # Экранируем промпт для JSON
    PROMPT_ESCAPED=$(echo "${{ steps.prep.outputs.prompt }}" | jq -R .)
    
    RESPONSE=$(curl -s -X POST https://api.deepseek.com/v1/chat/completions \
      -H "Content-Type: application/json" \
      -H "Authorization: Bearer $DEEPSEEK_KEY" \
      -d "{
        \"model\": \"deepseek-chat\",
        \"messages\": [
          {\"role\": \"system\", \"content\": \"Ты опытный Java-разработчик\"},
          {\"role\": \"user\", \"content\": $PROMPT_ESCAPED}
        ]
      }")
    
    echo "$RESPONSE" > response.json
    COMMENT=$(echo "$RESPONSE" | jq -r '.choices[0].message.content // "Ошибка: \(.error.message // "unknown")"')
    
    # Экранируем для GitHub API
    ESCAPED_COMMENT=$(echo "$COMMENT" | jq -R .)
    echo "REVIEW_COMMENT=$ESCAPED_COMMENT" >> $GITHUB_ENV

- name: Post comment to PR
  env:
    GITHUB_TOKEN: ${{ github.token }}
  run: |
    curl -X POST \
      -H "Authorization: Bearer $GITHUB_TOKEN" \
      -H "Accept: application/vnd.github.v3+json" \
      "https://api.github.com/repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments" \
      -d "{\"body\": \"## 🤖 Code Review от DeepSeek\n\n${{ env.REVIEW_COMMENT }}\"}"